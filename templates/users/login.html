{% extends 'base.html' %}

{% block title %}Login - NetForge Academy{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        
        <div class="card mb-4">
            <div class="card-body">
                <h3 class="fw-bold mb-4 text-center">
                    <i class="bi bi-box-arrow-in-right me-2"></i> Login to NetForge
                </h3>
                
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}
                
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input 
                            type="text" 
                            class="form-control" 
                            id="username" 
                            name="username"
                            placeholder="Enter your username"
                            required
                        >
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input 
                            type="password" 
                            class="form-control" 
                            id="password" 
                            name="password"
                            placeholder="Enter your password"
                            required
                        >
                    </div>
                    
                    <button type="submit" class="btn btn-info w-100 mb-3">
                        <i class="bi bi-check-circle me-2"></i> Login
                    </button>
                    
                </form>
                
                <p class="text-center text-secondary mb-0">
                    Don't have an account? 
                    <a href="{% url 'accounts:register' %}" class="text-info">Register here</a>
                </p>
            </div>
        </div>
    </div>
</div>

{% endblock %}
